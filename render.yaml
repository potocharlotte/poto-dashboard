services:
  - type: web
    name: poto-dashboard
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 2
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # You'll set this manually in Render dashboard
      - key: DATA_DIR
        value: /data
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
    disk:
      name: poto-data
      mountPath: /data
      sizeGB: 1
