<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poto Projects — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f0f4f1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: #fff;
  border-radius: 16px;
  padding: 48px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.login-logo {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
  color: #0f2d1e;
  margin-bottom: 4px;
}
.login-sub {
  font-size: 12px;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 36px;
}
label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #666;
  margin-bottom: 8px;
}
input[type="password"] {
  width: 100%;
  border: 1.5px solid #e0ddd9;
  border-radius: 8px;
  padding: 12px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: #1a1a1a;
  outline: none;
  transition: border-color 0.15s;
  margin-bottom: 20px;
}
input[type="password"]:focus { border-color: #1e5c3a; }
button {
  width: 100%;
  background: #1e5c3a;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 13px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: #174d31; }
.error {
  background: #fce4ec;
  color: #c62828;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 20px;
}
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">Poto Projects</div>
  <div class="login-sub">Financial Dashboard</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <label>Password</label>
    <input type="password" name="password" autofocus placeholder="Enter password">
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
